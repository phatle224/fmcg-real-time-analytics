services:
  minio:
    image: minio/minio:latest
    container_name: fmcg-minio
    restart: unless-stopped
    ports:
      - "${MINIO_PORT:-9005}:9000"
      - "${MINIO_CONSOLE_PORT:-9006}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    networks:
      - fmcg-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO Bucket Auto-Creation
  minio-create-bucket:
    image: minio/mc:latest
    container_name: fmcg-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set localminio http://minio:9000 minioadmin minioadmin;
      /usr/bin/mc mb --ignore-existing localminio/fmcg-lakehouse;
      exit 0;
      "
    networks:
      - fmcg-network

  metastore-db:
    image: mysql:8.0
    container_name: fmcg-metastore-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: metastore
      MYSQL_USER: hive
      MYSQL_PASSWORD: hivepassword
      MYSQL_ROOT_PASSWORD: rootpassword
    volumes:
      - metastore-db-data:/var/lib/mysql
    networks:
      - fmcg-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 5

  hive-metastore:
    image: bitsondatadev/hive-metastore:latest
    container_name: fmcg-hive-metastore
    restart: unless-stopped
    ports:
      - "${METASTORE_PORT:-9083}:9083"
    environment:
      METASTORE_TYPE: mysql
      METASTORE_DB_HOSTNAME: metastore-db
      METASTORE_DB_PORT: 3306
      METASTORE_DB_USER: hive
      METASTORE_DB_PASSWORD: hivepassword
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_DEFAULT_REGION: us-east-1
    volumes:
      - ./conf/hive-site.xml:/opt/apache-hive-metastore-3.0.0-bin/conf/hive-site.xml:ro
    depends_on:
      metastore-db:
        condition: service_healthy
    networks:
      - fmcg-network

volumes:
  minio-data:
  metastore-db-data:

networks:
  fmcg-network:
    driver: bridge
